<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin - GưChaSa Shop</title>
<link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-wrap">
  <form id="loginForm" class="login-card">
    <h1>🌿 GưChaSa Admin</h1>
    <p>Đăng nhập để quản lý đơn hàng</p>
    <input type="password" name="password" placeholder="Mật khẩu" required autofocus/>
    <button type="submit" class="btn btn-primary">Đăng nhập</button>
    <div id="loginErr" class="err"></div>
  </form>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <header class="admin-top">
    <div class="brand">🌿 GưChaSa Admin</div>
    <nav>
      <a href="#" data-tab="orders" class="active">Đơn hàng</a>
      <a href="#" data-tab="stats">Thống kê</a>
      <a href="#" data-tab="settings">Cài đặt</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Đăng xuất</button>
    </nav>
  </header>

  <!-- Orders tab -->
  <main class="tab" id="tab-orders">
    <div class="stat-row" id="statRow"></div>

    <div class="toolbar">
      <select id="filterStatus">
        <option value="all">Tất cả trạng thái</option>
        <option value="pending">Chờ thanh toán</option>
        <option value="paid">Đã thanh toán</option>
        <option value="confirmed">Đã xác nhận</option>
        <option value="shipping">Đang giao</option>
        <option value="delivered">Đã giao</option>
        <option value="cancelled">Đã huỷ</option>
      </select>
      <input id="searchBox" placeholder="Tìm theo tên, SĐT, mã đơn…"/>
      <button class="btn btn-ghost btn-sm" id="refreshBtn">🔄 Làm mới</button>
      <a class="btn btn-ghost btn-sm" id="exportBtn" href="/api/admin/export">⬇ Xuất CSV</a>
    </div>

    <div class="table-wrap">
      <table id="ordersTable">
        <thead><tr>
          <th>Mã đơn</th><th>Khách</th><th>SĐT</th><th>Địa chỉ</th>
          <th>SL</th><th>Tổng</th><th>Ngày</th><th>Trạng thái</th><th></th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <div id="emptyState" class="empty" style="display:none">Chưa có đơn hàng nào</div>
    </div>
    <div class="pager" id="pager"></div>
  </main>

  <!-- Stats tab -->
  <main class="tab" id="tab-stats" style="display:none">
    <h2>Doanh thu 14 ngày gần nhất</h2>
    <div class="chart-wrap"><canvas id="revChart" height="120"></canvas></div>
    <div class="stat-row" id="statRow2"></div>
  </main>

  <!-- Settings tab -->
  <main class="tab" id="tab-settings" style="display:none">
    <h2>Đổi mật khẩu admin</h2>
    <form id="pwdForm" class="form-card">
      <label>Mật khẩu mới (tối thiểu 6 ký tự)<input type="password" name="newPassword" required minlength="6"/></label>
      <button class="btn btn-primary">Cập nhật</button>
      <div id="pwdMsg" class="msg"></div>
    </form>
  </main>
</div>

<!-- Order detail modal -->
<div class="modal" id="detailModal">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeDetail()">×</button>
    <div id="detailBody"></div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
